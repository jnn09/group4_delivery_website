<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>exit</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/order_list.css') }}">
  <style>
    .confirmation-container {
      max-width: 500px;
      margin: 100px auto;
      background: rgba(255,255,255,0.95);
      padding: 30px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    .confirmation-container h2 {
      color: #bf5700;
    }
    .confirmation-container ul {
      text-align: left;
      margin: 20px 0;
      padding-left: 20px;
    }
    .confirmation-container button {
      background: #bf5700;
      color: white;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
    }
    .confirmation-container button:hover {
      background: #8c3d00;
    }
  </style>
</head>
<body>

<div class="confirmation-container">
  <h2>Thank you for visiting!</h2>
  <p>We hope to see you again soon.</p>
  <p>You may now close this tab.</p>

  <form>
    <button type="button" onclick="window.close();">Close</button>
  </form>
</div>

</body>
</html>
